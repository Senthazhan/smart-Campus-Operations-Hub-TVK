server:
  port: ${PORT:8081}

spring:
  application:
    name: ${APP_NAME:smart-campus-api}

  data:
    mongodb:
      uri: ${MONGO_URI:mongodb://localhost:27017}
      database: ${MONGO_DB:smart_campus}

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:dev-client-id}
            client-secret: ${GOOGLE_CLIENT_SECRET:dev-client-secret}
            scope:
              - openid
              - profile
              - email

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

app:
  env: ${APP_ENV:dev}
  frontend-base-url: ${FRONTEND_BASE_URL:http://localhost:5173}
  file-storage-root: ${FILE_STORAGE_ROOT:./storage}
  file-max-bytes: ${FILE_MAX_BYTES:10485760}
  jwt-secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
  jwt-expiration-ms: ${JWT_EXPIRATION:3600000}

logging:
  level:
    root: INFO
    org.springframework.security: INFO

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger

